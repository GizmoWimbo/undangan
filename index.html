<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Undangan Pernikahan</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #f6efe9;
      color: #3e2f2f;
      overflow-x: hidden;
    }

    /* ORNAMEN */
    .ornament {
      position: fixed;
      top: 0;
      width: 70px;
      height: 100%;
      background: url('https://i.ibb.co/6bQpK7R/bali-ornament.png') repeat-y center;
      background-size: contain;
      opacity: 0.12;
      z-index: 1;
    }
    .left { left: 0; }
    .right { right: 0; transform: scaleX(-1); }

    /* COVER */
    .cover {
      position: fixed;
      inset: 0;
      background: linear-gradient(rgba(0,0,0,.6), rgba(0,0,0,.6)),
                  url('https://images.unsplash.com/photo-1519741497674-611481863552');
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      color: white;
      z-index: 999;
      text-align: center;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      background: #a47148;
      border: none;
      border-radius: 30px;
      color: white;
      cursor: pointer;
    }

    header {
      text-align: center;
      padding: 100px 20px;
      background: #a47148;
      color: white;
      position: relative;
      z-index: 2;
    }

    section {
      padding: 40px 20px;
      position: relative;
      z-index: 2;
      text-align: center;
    }

    .card {
      background: white;
      margin: 20px auto;
      padding: 25px;
      max-width: 500px;
      border-radius: 20px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
      opacity: 0;
      transform: translateY(40px);
      transition: 0.6s;
    }

    .card.show {
      opacity: 1;
      transform: translateY(0);
    }

    .gallery img {
      width: 100%;
      border-radius: 15px;
      margin-top: 10px;
    }

    footer {
      background: #a47148;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .music-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #a47148;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 50%;
      cursor: pointer;
      z-index: 10;
    }

    /* MOBILE */
    @media (max-width:600px){
      .ornament{width:40px;}
      header{padding:70px 15px;}
      .card{margin:15px;}
    }
  </style>
</head>

<body>

<div class="ornament left"></div>
<div class="ornament right"></div>

<div class="cover" id="cover">
  <h1>Undangan Pernikahan</h1>
  <p>Sathya & Rena</p>
  <button class="btn" onclick="openInvite()">Buka Undangan</button>
</div>

<header>
  <p id="guestName"></p>
  <h1>Sathya & Rena</h1>
  <p>Om Swastyastu</p>
</header>

<section>
  <div class="card">
    <h2>Hari Bahagia</h2>
    <p>Sabtu, 22 April 2026</p>
  </div>

  <div class="card">
    <h2>Lokasi</h2>
    <p>Rumah</p>
    <p>Jl. Pramuka Gg. Putra No. 16x Karang Medain Barat</p>
  </div>

  <div class="card gallery">
    <h2>Galeri</h2>
    <img src="https://picsum.photos/400?1">
    <img src="https://picsum.photos/400?2">
  </div>

  <div class="card">
    <h2>Ucapan</h2>
    <p>Merupakan suatu kehormatan bagi kami apabila Anda berkenan hadir.</p>
  </div>
</section>

<footer>
  <p>Om Shanti Shanti Shanti Om</p>
</footer>

<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3">
</audio>

<button class="music-btn" onclick="toggleMusic()">🔊</button>

<script>
function openInvite(){
  document.getElementById('cover').style.display='none';
  document.getElementById('music').play();
}

// animasi scroll
const cards = document.querySelectorAll('.card');
window.addEventListener('scroll', () => {
  cards.forEach(card => {
    const top = card.getBoundingClientRect().top;
    if(top < window.innerHeight - 50){
      card.classList.add('show');
    }
  });
});

// nama tamu dari link
const params = new URLSearchParams(window.location.search);
const guest = params.get('to');
if(guest){
  document.getElementById('guestName').innerText = "Kepada Yth: " + guest;
}

function toggleMusic(){
  const music = document.getElementById('music');
  music.paused ? music.play() : music.pause();
}

// bunga jatuh
for(let i=0;i<10;i++){
  let f = document.createElement('div');
  f.innerHTML = "🌸";
  f.style.position="fixed";
  f.style.top="-20px";
  f.style.left=Math.random()*100+"vw";
  f.style.fontSize="20px";
  f.style.animation="fall "+(5+Math.random()*5)+"s linear infinite";
  document.body.appendChild(f);
}

</script>

<style>
@keyframes fall{
  to{transform:translateY(110vh) rotate(360deg);}
}
</style>

</body>
</html>
